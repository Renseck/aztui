# aztui configuration
# https://github.com/<your-repo>/aztui
#
# All values shown are defaults. Uncomment and modify as needed.

[general]
# data_dir = "~/.aztui"
# default_tenant = ""
# default_subscription = ""
# max_recent_contexts = 10

[cache]
# context_soft_ttl = 300    # 5 minutes — serve from cache, refresh in background
# context_hard_ttl = 3600   # 1 hour — force refresh
# resource_soft_ttl = 60    # 1 minute
# resource_hard_ttl = 300   # 5 minutes
# cost_soft_ttl = 300       # 5 minutes
# cost_hard_ttl = 1800      # 30 minutes

[security]
# master_password_enabled = false
# inactivity_timeout_secs = 600   # 10 minutes, null to disable
# use_os_keyring = false

[ui]
# mouse_enabled = true
# status_bar_position = "bottom"   # "top" or "bottom"
# show_operation_timing = true

[cli]
# az_path = ""              # auto-detect from PATH if empty
# default_timeout = 30      # seconds
# login_timeout = 120       # seconds (login can be slow with MFA)
# output_format = "json"
